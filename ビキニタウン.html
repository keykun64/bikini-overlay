<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ビキニタウン配信ツール</title>

<style>
body{
  margin:0;
  padding:0;
  background:transparent;
  overflow:hidden;
  font-family:sans-serif;
}

/* UI（デフォルトは非表示＝配信用） */
#ui{
  display:none; /* ←OBS運用ではこれが正解 */
  position:absolute;
  top:10px;
  left:10px;
  background:rgba(255,255,255,0.8);
  padding:10px;
  border-radius:10px;
}

/* キャラ */
#avatar{
  max-width:260px;
  max-height:260px;
  transition:transform 0.08s ease;
  user-select:none;
  -webkit-user-drag:none;
}

/* ジャンプ演出 */
.jump{
  transform:translateY(-25px) scale(1.08);
}
</style>
</head>

<body>

<!-- UI（必要ならdisplay:blockにすれば表示される） -->
<div id="ui">
  <h3>ビキニタウン配信ツール</h3>

  <input id="idle" type="file" accept="image/png"><br>通常PNG<br>
  <input id="talk" type="file" accept="image/png"><br>会話PNG<br>
  <input id="shout" type="file" accept="image/png"><br>絶叫PNG<br>

  <p>
    会話感度
    <input id="talkT" type="range" min="1" max="100" value="20">
  </p>

  <p>
    絶叫感度
    <input id="shoutT" type="range" min="1" max="150" value="60">
  </p>

  <button onclick="startMic()">マイク開始</button>
  <button onclick="toggleUI()">UI切替</button>

  <p id="status">待機中</p>
</div>

<!-- キャラ表示 -->
<img id="avatar">

<script>
const imgs = {};
const avatar = document.getElementById("avatar");
const status = document.getElementById("status");

let uiVisible = false;

/* 画像読み込み */
["idle","talk","shout"].forEach(id=>{
  document.getElementById(id).onchange = e=>{
    const f = e.target.files[0];
    if(f){
      imgs[id] = URL.createObjectURL(f);
      if(!avatar.src) avatar.src = imgs[id];
    }
  };
});

/* UI切替（必要なら使う） */
function toggleUI(){
  uiVisible = !uiVisible;
  document.getElementById("ui").style.display = uiVisible ? "block" : "none";
}

/* マイク処理 */
async function startMic(){
  const stream = await navigator.mediaDevices.getUserMedia({audio:true});

  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const src = ctx.createMediaStreamSource(stream);
  const analyser = ctx.createAnalyser();

  analyser.fftSize = 256;
  src.connect(analyser);

  const data = new Uint8Array(analyser.frequencyBinCount);

  loop();

  function loop(){
    analyser.getByteFrequencyData(data);

    const avg = data.reduce((a,b)=>a+b,0)/data.length;

    const talkT = +document.getElementById("talkT").value;
    const shoutT = +document.getElementById("shoutT").value;

    let mode = "idle";

    if(avg > shoutT) mode = "shout";
    else if(avg > talkT) mode = "talk";

    status.textContent = `状態:${mode} 音量:${Math.round(avg)}`;

    if(imgs[mode]) avatar.src = imgs[mode];

    avatar.className = (mode === "shout") ? "jump" : "";

    requestAnimationFrame(loop);
  }
}
</script>

</body>
</html>
