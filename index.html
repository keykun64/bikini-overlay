<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ビキニタウン配信ツール</title>

<style>
body{
  margin:0;
  background:transparent;
  overflow:hidden;
}

/* キャラ */
#avatar{
  max-width:260px;
  max-height:260px;
  transition:transform 0.08s ease;
  user-select:none;
  -webkit-user-drag:none;
}

.jump{
  transform:translateY(-25px) scale(1.08);
}

/* 開始ボタン */
#startBtn{
  position:fixed;
  top:10px;
  left:10px;
  z-index:10;
  padding:8px 12px;
  font-size:14px;
}

/* デバッグ */
#debug{
  position:fixed;
  top:50px;
  left:10px;
  font-size:12px;
  font-family:monospace;
  background:white;
  padding:4px;
}
</style>
</head>

<body>

<button id="startBtn">マイク開始</button>
<div id="debug">waiting...</div>

<img id="avatar">

<script>
const imgs = {
  idle: "idle.png",
  talk: "talk.png",
  shout: "shout.png"
};

const avatar = document.getElementById("avatar");
const debug = document.getElementById("debug");
const btn = document.getElementById("startBtn");

avatar.src = imgs.idle;

let mode = "idle";
let ctx, analyser, data;

// ★クリックで開始（重要）
btn.onclick = async () => {
  btn.disabled = true;

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: true
    });

    ctx = new (window.AudioContext || window.webkitAudioContext)();
    await ctx.resume();

    const src = ctx.createMediaStreamSource(stream);
    analyser = ctx.createAnalyser();

    analyser.fftSize = 256;
    src.connect(analyser);

    data = new Uint8Array(analyser.frequencyBinCount);

    btn.style.display = "none";

    loop();

  } catch(e){
    debug.innerText = "mic error: " + e.name + "\n" + e.message;
    console.error(e);
  }
};

function loop(){
  analyser.getByteFrequencyData(data);

  const avg = data.reduce((a,b)=>a+b,0)/data.length;

  debug.innerText = "avg: " + avg.toFixed(2);

  // ★現実的な感度（ここが重要）
  let newMode = "idle";

  if(avg > 20){
    newMode = "shout";
  } else if(avg > 5){
    newMode = "talk";
  }

  if(newMode !== mode){
    mode = newMode;
    avatar.src = imgs[mode];
  }

  avatar.className = (mode === "shout") ? "jump" : "";

  requestAnimationFrame(loop);
}
</script>

</body>
</html>
