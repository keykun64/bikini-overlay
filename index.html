<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ビキニタウン配信ツール</title>

<style>
body{
  margin:0;
  background:transparent;
  overflow:hidden;
}

/* キャラ */
#avatar{
  max-width:260px;
  max-height:260px;
  transition:transform 0.08s ease;
  user-select:none;
  -webkit-user-drag:none;
}

.jump{
  transform:translateY(-25px) scale(1.08);
}

/* UI（仮で残す） */
#ui{
  position:absolute;
  top:10px;
  left:10px;
  background:#e6ffe6;
  padding:10px;
  font-family:sans-serif;
}
</style>
</head>

<body>

<div id="ui">
  会話感度<br>
  <input type="range" id="talkRange" min="1" max="30" value="8"><br><br>

  絶叫感度<br>
  <input type="range" id="shoutRange" min="10" max="100" value="35">
</div>

<img id="avatar">

<script>
const imgs = {
  idle: "idle.png",
  talk: "talk.png",
  shout: "shout.png"
};

const avatar = document.getElementById("avatar");
const talkRange = document.getElementById("talkRange");
const shoutRange = document.getElementById("shoutRange");

let mode = "idle";
avatar.src = imgs.idle;

async function startMic(){
  const stream = await navigator.mediaDevices.getUserMedia({audio:true});

  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const src = ctx.createMediaStreamSource(stream);
  const analyser = ctx.createAnalyser();

  analyser.fftSize = 256;
  src.connect(analyser);

  const data = new Uint8Array(analyser.frequencyBinCount);

  loop();

  function loop(){
    analyser.getByteFrequencyData(data);

    const avg = data.reduce((a,b)=>a+b,0)/data.length;

    const talkThreshold = Number(talkRange.value);
    const shoutThreshold = Number(shoutRange.value);

    let newMode = "idle";

    if(avg > shoutThreshold){
      newMode = "shout";
    } else if(avg > talkThreshold){
      newMode = "talk";
    }

    if(newMode !== mode){
      mode = newMode;
      avatar.src = imgs[mode];
    }

    avatar.className = (mode === "shout") ? "jump" : "";

    requestAnimationFrame(loop);
  }
}

startMic();
</script>

</body>
</html>
